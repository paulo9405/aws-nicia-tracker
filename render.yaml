# Render Blueprint — deploy completo com um clique.
#
# Como usar:
#   1. Faça push deste arquivo para o repositório GitHub.
#   2. No Render → New → Blueprint → aponte para o repo.
#   3. Na tela de preview, preencha ADMIN_EMAIL e ADMIN_PASSWORD.
#   4. Clique Apply. Render criará banco + serviço automaticamente.
#   5. Após o primeiro deploy, copie a URL do serviço e atualize
#      CSRF_TRUSTED_ORIGINS em Environment → Save → Manual Deploy.

databases:
  - name: nicia-track-db
    databaseName: nicia_track
    user: nicia_track
    plan: free

services:
  - type: web
    name: nicia-track
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /conta/login/

    # preDeployCommand não é suportado no plano free do Render.
    # migrate + import_questions + create_admin rodam no CMD do Dockerfile.

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production

      # Render gera um SECRET_KEY seguro automaticamente na primeira criação.
      - key: SECRET_KEY
        generateValue: true

      # ".onrender.com" (com ponto no início) cobre qualquer subdomínio do Render.
      # Não é necessário saber o nome exato do serviço com antecedência.
      - key: ALLOWED_HOSTS
        value: .onrender.com

      # ⚠️  DEVE ser atualizado com a URL real após o primeiro deploy.
      # Formato: https://<nome-do-servico>.onrender.com
      # Enquanto não for configurado corretamente, os formulários retornam 403.
      - key: CSRF_TRUSTED_ORIGINS
        value: https://nicia-track.onrender.com

      # Credenciais do superusuário (admin Django).
      # Preencha na tela de preview do Blueprint antes de clicar em Apply.
      # sync: false = não sobrescrito pelo Blueprint em deploys futuros.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      # Credenciais do banco — injetadas automaticamente pelo Render.
      - key: PGHOST
        fromDatabase:
          name: nicia-track-db
          property: host
      - key: PGPORT
        fromDatabase:
          name: nicia-track-db
          property: port
      - key: PGDATABASE
        fromDatabase:
          name: nicia-track-db
          property: database
      - key: PGUSER
        fromDatabase:
          name: nicia-track-db
          property: user
      - key: PGPASSWORD
        fromDatabase:
          name: nicia-track-db
          property: password
