<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Nícia Track{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="min-vh-100 d-flex align-items-center justify-content-center py-4">
  <div class="w-100" style="max-width: 440px; padding: 0 1rem;">

    <div class="text-center mb-4">
      <i class="bi bi-mortarboard-fill text-primary" style="font-size: 2.5rem;"></i>
      <h1 class="h3 mt-2 fw-bold text-primary">Nícia Track</h1>
      <p class="text-muted small">Plataforma de preparação para concursos</p>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        {% block card_content %}{% endblock %}
      </div>
    </div>

    <p class="text-center text-muted small mt-3">{% block footer_link %}{% endblock %}</p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
