{% extends "accounts/base_auth.html" %}

{% block title %}Sair — Nícia Track{% endblock %}

{% block card_content %}
<div class="text-center py-2">
  <i class="bi bi-box-arrow-right text-secondary" style="font-size: 2rem;"></i>
  <h2 class="h5 fw-bold mt-3">Deseja sair?</h2>
  <p class="text-muted small">Você será desconectado da sua conta.</p>

  <form method="post" class="mt-4">
    {% csrf_token %}
    <div class="d-grid gap-2">
      <button type="submit" class="btn btn-danger">
        <i class="bi bi-box-arrow-right me-1"></i>Sim, sair
      </button>
      <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
